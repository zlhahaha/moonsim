name: Test

on:
  push:
  pull_request:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MoonBit (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libssl-dev
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gcc openssl
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME/.moon/bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-openssl

      - name: Show MoonBit version
        run: moon version --all

      - name: Format sources
        run: moon fmt

      - name: Check package warnings
        run: moon check --deny-warn

      - name: Moon build
        run: moon build

      - name: Generate public interfaces
        run: moon info

      - name: Verify generated interfaces are committed
        run: git diff --exit-code

      - name: Run tests
        run: moon test --deny-warn

      - name: Run CLI demo
        run: moon run cmd/main

      - name: Run example smoke tests
        run: |
          moon run examples/queue
          moon run examples/service_resilience
          moon run examples/workflow
          moon run examples/seed_matrix
          moon run cmd/benchmark

      - name: Coverage summary (Linux)
        if: runner.os == 'Linux'
        run: |
          moon test --deny-warn --enable-coverage
          moon coverage report -f summary
